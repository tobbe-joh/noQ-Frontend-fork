name: Create Pull Request

inputs:
  github_token:
    description: 'GitHub token'
    required: true
  parent_repository:
    description: 'Parent repository'
    required: true
  branch:
    description: 'Branch to create PR against'
    required: true
  title:
    description: 'Title of the PR'
    required: true
  body:
    description: 'Body of the PR'
    required: false

runs:
  using: 'node12'
  steps:
    - name: Create PR
      run: |
        const { exec } = require('child_process');
        const token = process.env.GITHUB_TOKEN;
        const parentRepo = "${{ inputs.parent_repository }}";
        const branch = "${{ inputs.branch }}";
        const title = "${{ inputs.title }}";
        const body = "${{ inputs.body || '' }}";
        
        exec(`gh pr create --base ${branch} --title "${title}" --body "${body}" --repo ${parentRepo}`, 
          { env: { GITHUB_TOKEN: token } }, 
          (err, stdout, stderr) => {
            if (err) {
              console.error(`Error: ${stderr}`);
              process.exit(1);
            }
            console.log(stdout);
          });
